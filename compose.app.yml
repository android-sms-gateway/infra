services:
  # Production backend service
  backend:
    image: ghcr.io/android-sms-gateway/server:latest
    environment:
      - TZ=${TIMEZONE:-UTC}
      - CONFIG_PATH=config.yml
      - HTTP__PROXIES=${HTTP__PROXIES}
      - DATABASE__TIMEZONE=${TIMEZONE:-UTC}
      - DATABASE__MAX_OPEN_CONNS=${BACKEND__DATABASE__MAX_OPEN_CONNS:-0}
      - DATABASE__MAX_IDLE_CONNS=${BACKEND__DATABASE__MAX_IDLE_CONNS:-0}
      - FCM__CREDENTIALS_JSON=${FCM__CREDENTIALS_JSON}

      - DATABASE__HOST=${BACKEND__DATABASE__HOST}
      - DATABASE__USER=${BACKEND__DATABASE__USER}
      - DATABASE__PASSWORD=${BACKEND__DATABASE__PASSWORD}
      - DATABASE__DATABASE=${BACKEND__DATABASE__DATABASE}

    configs:
      - source: backend_config-yml
        target: /app/config.yml
    networks:
      - internal
      - public
    deploy:
      labels:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/job: "backend"

        traefik.enable: "true"
        traefik.swarm.network: "public"
        traefik.http.services.backend.loadbalancer.server.port: "3000"

        traefik.http.routers.backend-3rdparty.entrypoints: "https"
        traefik.http.routers.backend-3rdparty.middlewares: "backend-3rdparty@file"
        traefik.http.routers.backend-3rdparty.rule: "Host(`${API_SUBDOMAIN}.${ROOT_DOMAIN}`)"
        traefik.http.routers.backend-3rdparty.tls.certresolver: "le"

        traefik.http.routers.backend-upstream.entrypoints: "https"
        traefik.http.routers.backend-upstream.middlewares: "backend-upstream@file"
        traefik.http.routers.backend-upstream.rule: "Host(`${UPSTREAM_SUBDOMAIN}.${ROOT_DOMAIN}`)"
        traefik.http.routers.backend-upstream.tls.certresolver: "le"

        traefik.http.routers.backend-mobile.entrypoints: "https"
        traefik.http.routers.backend-mobile.middlewares: "backend-mobile@file"
        traefik.http.routers.backend-mobile.rule: "Host(`${MOBILE_SUBDOMAIN}.${ROOT_DOMAIN}`)"
        traefik.http.routers.backend-mobile.tls.certresolver: "le"

        traefik.http.routers.backend-mobile-register.entrypoints: "https"
        traefik.http.routers.backend-mobile-register.middlewares: "backend-mobile-register@file"
        traefik.http.routers.backend-mobile-register.rule: "Host(`${MOBILE_SUBDOMAIN}.${ROOT_DOMAIN}`) && Path(`/v1/device`) && Method(`POST`)"
        traefik.http.routers.backend-mobile-register.tls.certresolver: "le"
      replicas: 0
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 64M
      restart_policy:
        condition: any
        window: 15s
      update_config:
        order: start-first
        monitor: 15s
        failure_action: rollback
      rollback_config:
        order: start-first
        monitor: 15s

  worker:
    image: ghcr.io/android-sms-gateway/server:latest
    entrypoint: ["/app/app"]
    command: ["worker"]
    environment:
      - TZ=${TIMEZONE:-UTC}
      - CONFIG_PATH=config.yml
      - DATABASE__TIMEZONE=${TIMEZONE:-UTC}
      - DATABASE__MAX_OPEN_CONNS=${BACKEND__DATABASE__MAX_OPEN_CONNS:-0}
      - DATABASE__MAX_IDLE_CONNS=${BACKEND__DATABASE__MAX_IDLE_CONNS:-0}

      - DATABASE__HOST=${BACKEND__DATABASE__HOST}
      - DATABASE__USER=${BACKEND__DATABASE__USER}
      - DATABASE__PASSWORD=${BACKEND__DATABASE__PASSWORD}
      - DATABASE__DATABASE=${BACKEND__DATABASE__DATABASE}

    configs:
      - source: backend_config-yml
        target: /app/config.yml
    networks:
      - internal
    deploy:
      labels:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/job: "worker"

      replicas: 0
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 64M
      restart_policy:
        condition: any
        window: 15s
      update_config:
        order: stop-first
        monitor: 15s
        failure_action: rollback
      rollback_config:
        order: stop-first
        monitor: 15s

  ca-backend:
    image: ghcr.io/android-sms-gateway/ca-backend:latest
    environment:
      - TZ=${TIMEZONE:-UTC}
      - HTTP__ADDRESS=:3000
      - HTTP__PROXY_HEADER=${HTTP__PROXY_HEADER}
      - HTTP__PROXIES=${HTTP__PROXIES}
      - STORAGE__URL=redis://redis:6379/0
      - CSR__TTL=${CSR__TTL:-24h}
      - CSR__CA_CERT_PATH=${CSR__CA_CERT_PATH:-/run/secrets/ca.crt}
      - CSR__CA_KEY_PATH=${CSR__CA_KEY_PATH:-/run/secrets/ca.key}
    networks:
      - internal
      - public
    secrets:
      - ca.crt
      - ca.key
    deploy:
      labels:
        # Prometheus
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/job: "ca"

        # Traefik
        traefik.swarm.network: "public"
        traefik.enable: "true"

        # Primary routes
        traefik.http.routers.ca-backend.rule: "Host(`ca.${ROOT_DOMAIN}`)"
        traefik.http.routers.ca-backend.entrypoints: "https"
        traefik.http.routers.ca-backend.tls.certresolver: "le"

        # Limited certificate issuance
        traefik.http.routers.ca-backend_limited.rule: "Host(`ca.${ROOT_DOMAIN}`) && Method(`POST`)"
        traefik.http.routers.ca-backend_limited.entrypoints: "https"
        traefik.http.routers.ca-backend_limited.tls.certresolver: "le"
        traefik.http.routers.ca-backend_limited.middlewares: "rate-limit_1-per-1m"

        # Rate limit
        traefik.http.middlewares.rate-limit_1-per-1m.ratelimit.average: "1"
        traefik.http.middlewares.rate-limit_1-per-1m.ratelimit.period: "1m"
        traefik.http.middlewares.rate-limit_1-per-1m.ratelimit.sourcecriterion.ipstrategy.depth: "1"

        # Service definition
        traefik.http.services.ca-backend.loadbalancer.server.port: "3000"

        # Metrics protection
        traefik.http.routers.ca-backend_metrics.entrypoints: "https"
        traefik.http.routers.ca-backend_metrics.middlewares: "monitoring-metrics-access-control@file"
        traefik.http.routers.ca-backend_metrics.rule: "Host(`ca.${ROOT_DOMAIN}`) && PathPrefix(`/metrics`)"
        traefik.http.routers.ca-backend_metrics.tls.certresolver: "le"
      replicas: 0
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 64M
      restart_policy:
        condition: any
        window: 15s
      update_config:
        order: start-first
        monitor: 15s
        failure_action: rollback
      rollback_config:
        order: start-first
        monitor: 15s

  smpp-server:
    image: ghcr.io/android-sms-gateway/smpp-server:latest
    environment:
      - TZ=${TIMEZONE:-UTC}
      - HTTP__ADDRESS=:3000
      - SMPP__BIND_ADDRESS=:2775
      - GATEWAY__API_BASE_URL=${SMPP__GATEWAY__API_BASE_URL:-http://backend:3000/api/3rdparty/v1}
      - GATEWAY__WEBHOOK_BASE_URL=https://smpp.${ROOT_DOMAIN}
      - GATEWAY__TIMEOUT=60s
    networks:
      - internal
      - public
    deploy:
      labels:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/job: "smpp-server"

        traefik.enable: "true"
        traefik.swarm.network: "public"
        traefik.http.services.smpp-server.loadbalancer.server.port: "3000"
        # traefik.http.routers.smpp-server.entrypoints: "https"
        # traefik.http.routers.smpp-server.rule: "Host(`smpp.${ROOT_DOMAIN}`)"
        # traefik.http.routers.smpp-server.tls.certresolver: "le"

        traefik.http.routers.smpp-server-metrics.entrypoints: "https"
        traefik.http.routers.smpp-server-metrics.middlewares: "monitoring-metrics-access-control@file"
        traefik.http.routers.smpp-server-metrics.rule: "Host(`smpp.${ROOT_DOMAIN}`) && PathPrefix(`/metrics`)"
        traefik.http.routers.smpp-server-metrics.tls.certresolver: "le"

        traefik.tcp.routers.smpp-server.rule: "HostSNI(`*`)"
        traefik.tcp.routers.smpp-server.entrypoints: "smpp"
        traefik.tcp.routers.smpp-server.tls: "false"
        traefik.tcp.services.smpp-server.loadbalancer.server.port: "2775"

        traefik.tcp.routers.smpps-server.rule: "HostSNI(`smpp.${ROOT_DOMAIN}`)"
        traefik.tcp.routers.smpps-server.entrypoints: "smpps"
        traefik.tcp.routers.smpps-server.tls.certresolver: "le"
      replicas: 1
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 64M
      restart_policy:
        condition: any
        window: 15s
      update_config:
        order: start-first
        monitor: 15s
        failure_action: rollback
      rollback_config:
        order: start-first
        monitor: 15s

  email-to-sms:
    image: ghcr.io/android-sms-gateway/email-to-sms:latest
    environment:
      - TZ=${TIMEZONE:-UTC}
      - HTTP__ADDRESS=:3000
      - HTTP__PROXY_HEADER=${HTTP__PROXY_HEADER}
      - HTTP__PROXIES=${HTTP__PROXIES}
      - SMTP__HOST=0.0.0.0
      - SMTP__PORT=587
      - SMTP__DOMAIN=smtp.${ROOT_DOMAIN}
      - SMSGATE__URL=${EMAIL_TO_SMS__GATEWAY__API_BASE_URL:-http://backend:3000/api/3rdparty/v1}
      - SMSGATE__SKIP_PHONE_VALIDATION=false
    networks:
      - internal
      - public
    deploy:
      labels:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/job: "email-to-sms"

        traefik.enable: "true"
        traefik.swarm.network: "public"

        # SMTP (port 587, TCP passthrough, no TLS)
        traefik.tcp.services.email-to-sms.loadbalancer.server.port: "587"
        traefik.tcp.routers.email-to-sms-smtp.rule: "HostSNI(`*`)"
        traefik.tcp.routers.email-to-sms-smtp.entrypoints: "smtp"

        # SMTPS (port 465, TLS termination on Traefik via LE)
        traefik.tcp.routers.email-to-sms-smtps.rule: "HostSNI(`smtp.${ROOT_DOMAIN}`)"
        traefik.tcp.routers.email-to-sms-smtps.entrypoints: "smtps"
        traefik.tcp.routers.email-to-sms-smtps.tls.certresolver: "le"

        # HTTP metrics/health via HTTPS
        traefik.http.services.email-to-sms.loadbalancer.server.port: "3000"
        traefik.http.routers.email-to-sms-metrics.entrypoints: "https"
        traefik.http.routers.email-to-sms-metrics.middlewares: "monitoring-metrics-access-control@file"
        traefik.http.routers.email-to-sms-metrics.rule: "Host(`smtp.${ROOT_DOMAIN}`) && PathPrefix(`/metrics`)"
        traefik.http.routers.email-to-sms-metrics.tls.certresolver: "le"
      replicas: 1
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 64M
      restart_policy:
        condition: any
        window: 15s
      update_config:
        order: start-first
        monitor: 15s
        failure_action: rollback
      rollback_config:
        order: start-first
        monitor: 15s

configs:
  backend_config-yml:
    name: app_backend_config-yml_${STACK_VERSION:-0}
    file: backend/config.yml

secrets:
  ca.crt:
    name: root-ca.crt
    external: true
  ca.key:
    name: root-ca.key
    external: true

networks:
  internal:
    external: true
  public:
    external: true
